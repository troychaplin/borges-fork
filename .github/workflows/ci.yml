name: CI

on:
    push:
        branches:
            - main
            - master
            - 'codex/**'
    pull_request:

permissions:
    contents: read

jobs:
    quality:
        name: Quality (Node 22)
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v5

            - name: Set up Node.js
              uses: actions/setup-node@v5
              with:
                  node-version: 22
                  cache: npm

            - name: Install dependencies
              run: npm ci --legacy-peer-deps

            - name: Lint JavaScript
              run: npm run lint:js

            - name: Lint CSS
              run: npm run lint:css

            - name: Lint i18n artifacts
              run: npm run lint:i18n

            - name: Audit production npm dependencies
              run: npm audit --omit=dev --omit=optional

            - name: Run unit tests
              run: npm test -- --runInBand --silent

            - name: Build
              run: npm run build

    phpunit:
        name: PHPUnit
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v5

            - name: Set up PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: '8.3'
                  coverage: none

            - name: Validate Composer files
              run: composer validate --strict

            - name: Install Composer dependencies
              run: composer install --no-interaction --prefer-dist

            - name: Audit Composer production dependencies
              run: composer audit --no-dev

            - name: Run PHPCS
              run: composer lint:php

            - name: Run PHPUnit
              run: composer test:php

    playwright-playground:
        name: Playwright Playground smoke
        runs-on: ubuntu-latest
        needs: quality

        steps:
            - name: Checkout
              uses: actions/checkout@v5

            - name: Set up Node.js
              uses: actions/setup-node@v5
              with:
                  node-version: 22
                  cache: npm

            - name: Install dependencies
              run: npm ci --legacy-peer-deps

            - name: Build
              run: npm run build

            - name: Install Playwright browsers
              run: npx playwright install --with-deps chromium

            - name: Run Playground Playwright smoke
              run: npm run test:e2e:playground

            - name: Run accessibility gate
              run: npm run test:a11y

            - name: Package release zip (for lifecycle tests)
              run: npm run package:release

            - name: Run lifecycle e2e tests
              run: npm run test:e2e:lifecycle

            - name: Upload Playwright results
              if: always()
              uses: actions/upload-artifact@v6
              with:
                  name: playwright-results
                  path: |
                      test-results
                      .tmp/playground-e2e
                  if-no-files-found: warn

    psalm:
        name: Psalm
        runs-on: ubuntu-latest
        needs: phpunit

        steps:
            - name: Checkout
              uses: actions/checkout@v5

            - name: Set up PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: '8.3'
                  coverage: none

            - name: Install Composer dependencies
              run: composer install --no-interaction --prefer-dist

            - name: Run Psalm
              run: composer analyze:php

    coverage:
        name: Coverage upload
        runs-on: ubuntu-latest
        needs:
            - quality
            - phpunit
        continue-on-error: true
        permissions:
            contents: read
            id-token: write

        steps:
            - name: Checkout
              uses: actions/checkout@v5

            - name: Set up Node.js
              uses: actions/setup-node@v5
              with:
                  node-version: 22
                  cache: npm

            - name: Set up PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: '8.3'
                  coverage: xdebug

            - name: Install JS dependencies
              run: npm ci --legacy-peer-deps

            - name: Install Composer dependencies
              run: composer install --no-interaction --prefer-dist

            - name: Generate JS coverage
              run: npm run test:js:coverage

            - name: Generate PHP coverage
              run: composer test:php:coverage

            - name: Upload to Codecov
              uses: codecov/codecov-action@v5
              with:
                  files: ./coverage/clover.xml,./build/logs/phpunit-clover.xml
                  slug: dknauss/Borges
                  use_oidc: true
                  fail_ci_if_error: false

    package-release:
        name: Package release artifact
        runs-on: ubuntu-latest
        needs:
            - quality
            - phpunit

        steps:
            - name: Checkout
              uses: actions/checkout@v5

            - name: Set up Node.js
              uses: actions/setup-node@v5
              with:
                  node-version: 22
                  cache: npm

            - name: Install dependencies
              run: npm ci --legacy-peer-deps

            - name: Build
              run: npm run build

            - name: Package plugin
              run: npm run package:release

            - name: Upload packaged plugin artifact
              uses: actions/upload-artifact@v6
              with:
                  name: bibliography-release
                  path: output/release/borges-bibliography-builder.zip
                  if-no-files-found: error

    # Publish the packaged main build to a rolling `main-preview` pre-release so
    # WordPress Playground has a stable, CORS-reachable URL for the current main
    # HEAD (git:directory is unavailable in live Playground). Isolated in its own
    # job so the write-scoped token is never present during checkout/build/package
    # (and never on pull_request or codex/** runs), gated behind the full required
    # CI suite so the Main-build badge can't install a build from a run that later
    # failed, and reuses the exact artifact those gates validated.
    publish-main-preview:
        name: Publish rolling main preview
        runs-on: ubuntu-latest
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        needs:
            - quality
            - phpunit
            - playwright-playground
            - psalm
            - package-release
        permissions:
            contents: write

        steps:
            - name: Download packaged plugin artifact
              uses: actions/download-artifact@v6
              with:
                  name: bibliography-release
                  path: output/release

            # Guard against a slower older run overwriting `main-preview` with a
            # stale ZIP. The tip re-check and the asset write live in ONE step so
            # the check happens immediately before the upload (minimal TOCTOU
            # window): if `main` has advanced past this commit, skip — the newer
            # run publishes. Correct regardless of job-scheduling order, unlike
            # job-level concurrency (which can cancel the newer run instead).
            - name: Publish rolling main preview
              # This job has no checkout, so gh cannot infer the repo from a local
              # git remote; GH_REPO gives `gh release`/`gh api` their repo context.
              env:
                  GH_TOKEN: ${{ github.token }}
                  GH_REPO: ${{ github.repository }}
              run: |
                  tip="$(gh api "repos/${{ github.repository }}/commits/main" --jq .sha)"
                  if [ "$tip" != "${{ github.sha }}" ]; then
                      echo "::notice::main advanced to ${tip}; skipping stale main-preview publish for ${{ github.sha }}"
                      exit 0
                  fi
                  if ! gh release view main-preview >/dev/null 2>&1; then
                      gh release create main-preview \
                          --prerelease \
                          --title "Main branch preview (rolling)" \
                          --notes "Automated rolling build of the \`main\` branch, refreshed on every push. This is **not** a stable release — for production use install the latest tagged release or the WordPress.org listing."
                  fi
                  gh release upload main-preview output/release/borges-bibliography-builder.zip --clobber
