name: CI

on:
    push:
        branches:
            - main
            - master
            - 'codex/**'
    pull_request:

permissions:
    contents: read

jobs:
    quality:
        name: Quality (Node 22)
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v5

            - name: Set up Node.js
              uses: actions/setup-node@v5
              with:
                  node-version: 22
                  cache: npm

            - name: Install dependencies
              run: npm ci --legacy-peer-deps

            - name: Lint JavaScript
              run: npm run lint:js

            - name: Lint CSS
              run: npm run lint:css

            - name: Lint i18n artifacts
              run: npm run lint:i18n

            - name: Audit production npm dependencies
              run: npm audit --omit=dev --omit=optional

            - name: Run unit tests
              run: npm test -- --runInBand --silent

            - name: Build
              run: npm run build

    phpunit:
        name: PHPUnit
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v5

            - name: Set up PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: '8.3'
                  coverage: none

            - name: Validate Composer files
              run: composer validate --strict

            - name: Install Composer dependencies
              run: composer install --no-interaction --prefer-dist

            - name: Audit Composer production dependencies
              run: composer audit --no-dev

            - name: Run PHPCS
              run: composer lint:php

            - name: Run PHPUnit
              run: composer test:php

    playwright-playground:
        name: Playwright Playground smoke
        runs-on: ubuntu-latest
        needs: quality

        steps:
            - name: Checkout
              uses: actions/checkout@v5

            - name: Set up Node.js
              uses: actions/setup-node@v5
              with:
                  node-version: 22
                  cache: npm

            - name: Install dependencies
              run: npm ci --legacy-peer-deps

            - name: Build
              run: npm run build

            - name: Install Playwright browsers
              run: npx playwright install --with-deps chromium

            - name: Run Playground Playwright smoke
              run: npm run test:e2e:playground

            - name: Run accessibility gate
              run: npm run test:a11y

            - name: Package release zip (for lifecycle tests)
              run: npm run package:release

            - name: Run lifecycle e2e tests
              run: npm run test:e2e:lifecycle

            - name: Upload Playwright results
              if: always()
              uses: actions/upload-artifact@v6
              with:
                  name: playwright-results
                  path: |
                      test-results
                      .tmp/playground-e2e
                  if-no-files-found: warn

    psalm:
        name: Psalm
        runs-on: ubuntu-latest
        needs: phpunit

        steps:
            - name: Checkout
              uses: actions/checkout@v5

            - name: Set up PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: '8.3'
                  coverage: none

            - name: Install Composer dependencies
              run: composer install --no-interaction --prefer-dist

            - name: Run Psalm
              run: composer analyze:php

    coverage:
        name: Coverage upload
        runs-on: ubuntu-latest
        needs:
            - quality
            - phpunit
        continue-on-error: true
        permissions:
            contents: read
            id-token: write

        steps:
            - name: Checkout
              uses: actions/checkout@v5

            - name: Set up Node.js
              uses: actions/setup-node@v5
              with:
                  node-version: 22
                  cache: npm

            - name: Set up PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: '8.3'
                  coverage: xdebug

            - name: Install JS dependencies
              run: npm ci --legacy-peer-deps

            - name: Install Composer dependencies
              run: composer install --no-interaction --prefer-dist

            - name: Generate JS coverage
              run: npm run test:js:coverage

            - name: Generate PHP coverage
              run: composer test:php:coverage

            - name: Upload to Codecov
              uses: codecov/codecov-action@v5
              with:
                  files: ./coverage/clover.xml,./build/logs/phpunit-clover.xml
                  slug: dknauss/Borges
                  use_oidc: true
                  fail_ci_if_error: false

    package-release:
        name: Package release artifact
        runs-on: ubuntu-latest
        needs:
            - quality
            - phpunit

        steps:
            - name: Checkout
              uses: actions/checkout@v5

            - name: Set up Node.js
              uses: actions/setup-node@v5
              with:
                  node-version: 22
                  cache: npm

            - name: Install dependencies
              run: npm ci --legacy-peer-deps

            - name: Build
              run: npm run build

            - name: Package plugin
              run: npm run package:release

            - name: Upload packaged plugin artifact
              uses: actions/upload-artifact@v6
              with:
                  name: bibliography-release
                  path: output/release/borges-bibliography-builder.zip
                  if-no-files-found: error
